# Railway / Nixpacks build configuration.
# Provisions the system libraries Playwright's Chromium needs to launch
# during the prerender step.

[phases.setup]
aptPkgs = [
  "libglib2.0-0",
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2",
  "libatspi2.0-0",
  "libxshmfence1",
  "fonts-liberation",
  "fonts-noto-color-emoji"
]
